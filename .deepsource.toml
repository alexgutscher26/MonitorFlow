version = 1

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  environment = ["nodejs", "browser"]
  plugins = ["react"]
  style_guide = "standard"
  dialect = "typescript"
  module_system = "es-modules"
  dependency_file_paths = [
    "package.json",
    "package-lock.json"
  ]
  skip_doc_coverage = ["test/**/*"]
  max_line_length = 100
  target_version = "es2022"

[[analyzers]]
name = "test-coverage"
enabled = true

  [analyzers.meta]
  type = "lcov"
  directory = "coverage"

[[analyzers]]
name = "secrets"
enabled = true

  [analyzers.meta]
  exclude_patterns = [
    "test/"
  ]
  trusted_hosts = [
    "localhost",
    ".monitorflow.dev"
  ]

[[analyzers]]
name = "docker"
enabled = true

[[transformers]]
name = "prettier"
enabled = true

[exclude]
paths = [
    "node_modules/**",
    ".next/**",
    "dist/**",
    "build/**",
    "coverage/**"
]