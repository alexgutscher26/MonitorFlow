version = 1

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  environment = ["nodejs", "browser"]
  plugins = ["react"]
  style_guide = "standard"
  dialect = "typescript"
  module_system = "es-modules"
  dependency_file_paths = [
    "package.json",
    "package-lock.json"
  ]
  skip_doc_coverage = "test/**/*"
  max_line_length = 100
  target_version = "es2022"

[[analyzers]]
name = "test-coverage"
enabled = true

  [analyzers.meta]
  coverage_format = "lcov"
  path = "coverage/lcov.info"
  minimum_coverage = 75.0

[[analyzers]]
name = "secrets"
enabled = true

  [analyzers.meta]
  exclude_paths = [
    "test/**/*"
  ]
  trusted_domains = [
    "localhost",
    ".monitorflow.dev"
  ]

[[analyzers]]
name = "docker"
enabled = true

[[transformers]]
name = "prettier"
enabled = true

[exclude]
paths = [
    "node_modules/**",
    ".next/**",
    "dist/**",
    "build/**",
    "coverage/**"
]

[metrics]
enabled = true
  
  [metrics.meta]
  target_branch = "main"
  cyclomatic_threshold = 15
  maintainability_threshold = 80.0